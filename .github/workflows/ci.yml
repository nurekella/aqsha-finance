name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @aqsha/api prisma:generate

      - run: pnpm typecheck

      - run: pnpm test

  e2e:
    name: API e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: aqsha
          POSTGRES_PASSWORD: aqsha
          POSTGRES_DB: aqsha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aqsha"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aqsha:aqsha@localhost:5432/aqsha_test?schema=public
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      WEB_ORIGIN: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @aqsha/api prisma:generate

      - name: Run API e2e tests
        run: pnpm --filter @aqsha/api test:e2e
